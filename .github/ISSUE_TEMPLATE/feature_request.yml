name: Feature request
description: Propose a subtitle format, rule, profile, cleanup, report, or review-workflow improvement
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        Proposals should preserve subtitle timing, editorial control, and deterministic local processing.
  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - SRT support
        - WebVTT support
        - Additional subtitle format
        - Timing rule
        - Readability rule
        - Style profile
        - Safe cleanup
        - Format conversion
        - Report output
        - Review and approval workflow
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: Describe the subtitle-production problem and affected users.
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Proposed behavior
      description: Explain parsing, findings, output, and editorial controls.
    validations:
      required: true
  - type: textarea
    id: fixture
    attributes:
      label: Minimal synthetic subtitle example
      render: text
  - type: textarea
    id: compatibility
    attributes:
      label: Format and profile compatibility
      description: Explain SRT, WebVTT, timing, identifier, and profile impact.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Project-boundary checks
      options:
        - label: Automatic behavior remains deterministic and opt-in.
          required: true
        - label: The proposal does not silently rewrite dialogue meaning.
          required: true
        - label: The proposal can be tested with synthetic subtitle text.
          required: true
